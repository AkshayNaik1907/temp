name: Python Script CI

on:
  push:
    branches:
      - main
  schedule:
    - cron: '30 1 * * *'

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout JenkinsBranch
      uses: actions/checkout@v4
      with:
        ref: JenkinsBranch

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.x'
    
    - name: Show runner time
      run: |
        echo "Current UTC time:"
        date -u
        echo "Current IST time:"
        date -u -d "+5 hours 30 minutes"
        
    - name: Run Python Script and save output
      run: |
        echo "Starting script execution..."
        python scripts/find_tabs.py | tee output.txt
        echo "Script execution completed."
        
    - name: Update README with output
      run: |
        # Insert output at the end of README.md or customize as needed
        echo -e "\n## Latest Script Output\n" >> README.md
        cat output.txt >> README.md
        
        # Configure git
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        
        # Commit and push changes
        git add README.md
        git commit -m "Update README with latest script output [skip ci]" || echo "No changes to commit"
        git push origin JenkinsBranch
        
    - name: Upload output file
      uses: actions/upload-artifact@v4
      with:
        name: script-output
        path: output.txt