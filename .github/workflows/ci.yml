name: Python Script CI

# Give workflow permission to push changes
permissions:
  contents: write

on:
  push:
    branches:
      - main
  schedule:
    - cron: '30 1 * * *'
  workflow_dispatch:

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
    # Checkout the branch
    - name: Checkout JenkinsBranch
      uses: actions/checkout@v4

    # Set up Python
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.x'
    
    # Show runner time
    - name: Show runner time
      run: |
        echo "Current UTC time:"
        date -u
        echo "Current IST time:"
        date -u -d "+5 hours 30 minutes"
        
    # Run Python script and save output
    - name: Run Python Script and save output
      run: |
        echo "Starting script execution..."
        python scripts/find_tabs.py | tee output.txt
        echo "Script execution completed."

    # Update README.md with latest output
    - name: Update README with output
      shell: pwsh
      run: |
        git config user.name "github-actions"
        git config user.email "github-actions@github.com"
        
        git stash push -m "build-update" || true
        git pull --rebase origin main
        
        git stash pop || true
        
        git add output.txt
        git commit -m "Update build status [CI]" || echo "No changes"
        git pull --rebase origin main
        git push origin main

    # Upload output as artifact
    - name: Upload output file
      uses: actions/upload-artifact@v4
      with:
        name: script-output
        path: output.txt
        
    - name: Create email script
      run: |
        cat > send_mail.py << 'EOF'
        import smtplib
        from email.mime.text import MIMEText
        sender = "chessnitro@gmail.com"
        receiver = "nakshay530@gmail.com"
        password = "${{ secrets.EMAIL_PASSWORD }}"
        msg = MIMEText("Hi from GitHub Actions")
        msg["Subject"] = "Greeting from GitHub Actions"
        msg["From"] = sender
        msg["To"] = receiver
        server = smtplib.SMTP("smtp.gmail.com", 587)
        server.starttls()
        server.login(sender, password)
        server.send_message(msg)
        server.quit()
        EOF
        
    - name: Send Email
      run: python send_mail.py